<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Spiced — Agent Settings</title>

<style>
:root{
  --bg0:#0f0b07;
  --bg1:#170d08;
  --text:#fff3e6;
  --muted:#d8bfa8;
  --spice:#ff3b2f;
  --spice2:#ffb11f;
  --border: rgba(255,200,150,.18);
  --radius:16px;
  --shadow: 0 18px 60px rgba(0,0,0,.55);
  --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:var(--sans);
  color:var(--text);
  background:
    radial-gradient(900px 700px at 15% 15%, rgba(255,59,47,.22), transparent 55%),
    linear-gradient(180deg,var(--bg1),var(--bg0));
}
.nav{
  position:sticky;
  top:0;
  background:rgba(10,6,4,.7);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  display:flex;
  justify-content:space-between;
  padding:12px 24px;
}
.nav a{
  color:#fff;
  text-decoration:none;
  font-weight:700;
  margin-left:12px;
}
.nav .active{
  padding:6px 12px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(255,59,47,.4),rgba(255,177,31,.3));
}

.page{
  padding:24px;
  max-width:720px;
}

.card{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.15));
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:20px;
}

h1{margin:0 0 6px;font-size:20px;}
p{margin:0;color:var(--muted);font-size:13px;}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:16px;
  gap:12px;
}

.toggle{
  position:relative;
  width:54px;
  height:30px;
}
.toggle input{display:none;}
.slider{
  position:absolute;
  inset:0;
  background:#333;
  border-radius:999px;
  cursor:pointer;
}
.slider::before{
  content:"";
  position:absolute;
  width:24px;
  height:24px;
  left:3px;
  top:3px;
  background:#fff;
  border-radius:50%;
  transition:.2s;
}
.toggle input:checked + .slider{
  background:linear-gradient(135deg,var(--spice),var(--spice2));
}
.toggle input:checked + .slider::before{
  transform:translateX(24px);
}

.radio-group{
  display:flex;
  gap:12px;
  margin-top:12px;
}
.radio{
  flex:1;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  cursor:pointer;
}
.radio input{display:none;}
.radio.active{
  background:linear-gradient(135deg,rgba(255,59,47,.25),rgba(255,177,31,.18));
  border-color:rgba(255,177,31,.35);
}

.status{
  font-size:13px;
  margin-top:10px;
}
.status.ok{color:#22c55e;}
.status.warn{color:#f59e0b;}
.status.err{color:#ef4444;}
</style>
</head>

<body>

<nav class="nav">
  <div class="nav-inner">
    <strong>Restaurant Ops Panel</strong>
    <div>
      <a href="orders.html">Orders</a>
      <a href="marketting.html">Marketting</a>
      <a class="active" href="settings.html">Settings</a>
    </div>
  </div>
</nav>

<div class="page">

  <!-- AGENT STATUS -->
  <div class="card">
    <h1>Agent Status</h1>
    <p>Turn the AI agent ON or OFF instantly.</p>

    <div class="row">
      <strong>AI Agent</strong>
      <label class="toggle">
        <input type="checkbox" id="agentToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div id="agentStatus" class="status">Checking status…</div>
  </div>

  <!-- CALL HANDLING MODE -->
  <div class="card">
    <h1>Call Handling Mode</h1>
    <p>Choose how incoming calls are handled.</p>

    <div class="radio-group">
      <label class="radio" id="mode-ai">
        <input type="radio" name="mode" value="ai">
        <strong>AI Answers Calls</strong>
      </label>

      <label class="radio" id="mode-forward">
        <input type="radio" name="mode" value="forward">
        <strong>Forward All Calls</strong>
      </label>
    </div>

    <div id="modeStatus" class="status"></div>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const RETELL_API_KEY = "key_0adcde58db51a4f0f940ebe3270d"; // ⚠️ move to backend later
const AGENT_ID = "agent_80ab767088b11cd981b3ac171a";

/* ================= HELPERS ================= */
async function retellPatch(body){
  const res = await fetch(
    `https://api.retellai.com/v2/agents/${AGENT_ID}`,
    {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${RETELL_API_KEY}`
      },
      body:JSON.stringify(body)
    }
  );
  if(!res.ok){
    const t = await res.text();
    throw new Error(t || res.statusText);
  }
  return res.json();
}

/* ================= AGENT STATUS ================= */
const toggle = document.getElementById("agentToggle");
const statusEl = document.getElementById("agentStatus");

toggle.addEventListener("change", async ()=>{
  statusEl.textContent = "Updating…";
  try{
    await retellPatch({ enabled: toggle.checked });
    statusEl.textContent = toggle.checked ? "🟢 Agent is LIVE" : "🔴 Agent is OFF";
    statusEl.className = "status ok";
  }catch(e){
    statusEl.textContent = "❌ Failed to update agent";
    statusEl.className = "status err";
    toggle.checked = !toggle.checked;
  }
});

/* ================= CALL MODE ================= */
const aiBox = document.getElementById("mode-ai");
const fwdBox = document.getElementById("mode-forward");
const modeStatus = document.getElementById("modeStatus");

function setActive(box){
  aiBox.classList.remove("active");
  fwdBox.classList.remove("active");
  box.classList.add("active");
}

aiBox.onclick = async ()=>{
  setActive(aiBox);
  modeStatus.textContent = "Updating…";
  try{
    await retellPatch({ call_handling_mode: "ai" });
    modeStatus.textContent = "AI will answer calls";
    modeStatus.className = "status ok";
  }catch(e){
    modeStatus.textContent = "Failed to update mode";
    modeStatus.className = "status err";
  }
};

fwdBox.onclick = async ()=>{
  setActive(fwdBox);
  modeStatus.textContent = "Updating…";
  try{
    await retellPatch({ call_handling_mode: "forward" });
    modeStatus.textContent = "All calls will be forwarded (AI disabled)";
    modeStatus.className = "status warn";
  }catch(e){
    modeStatus.textContent = "Failed to update mode";
    modeStatus.className = "status err";
  }
};
</script>

</body>
</html>
